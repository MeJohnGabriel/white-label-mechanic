    <header>
      <nav class="nav-container">
        <ul class="nav-items">
          <img class="logo-icon" src="imgs/System-Logo.png" alt="System-Logo" />

        </ul>
      </nav>
    </header>
    <main>
      <section id="client">
        <div class="input-client">
          <input type="text" name="CPF" placeholder="CPF" id="search" />
          <img id="searchBtn" src="imgs/icon-search.png" alt="search-btn" />
          <img id="deleteAll" src="imgs/delete-btnn.png" alt="delete-btn" />
        </div>
        <section id="formTableContainer">
          <div id="tableContainer">
            <table border="1">
              <thead>
                <th id="cpfTitle">CPF</th>
                <th id="clienteTitle">CLIENTE</th>
                <th id="veiculoTitle">VEÍCULO</th>
                <th id="anoModeloTitle">ANO/MODELO</th>
                <th id="placaTitle">PLACA</th>
                <th id="statusTitle">STATUS</th>
                <th id="statusTitle">DATA</th>
                <th id="statusTitle">SERVIÇOS/PEÇAS</th>
                <th id="statusTitle">ORÇAMENTO</th>
                <!-- <th id="statusTitle">ATENDENTE</th> -->
                <!-- <th id="statusTitle">MECANICO</th> -->
              </thead>
              <tbody id="tableClientes">
                <!--  -->
              </tbody>
            </table>
          </div>
          <div id="form">
            <form>
              <div class="cpf">
                <label for="CPF">CPF</label>
                <input type="text" id="CPF" name="CPF" />
              </div>
              <div class="cliente">
                <label for="CLIENTE">CLIENTE</label>
                <input type="text" name="CLIENTE" id="CLIENTE" />
              </div>
              <div class="telefone">
                <label for="telefone">TEL.</label>
                <input type="text" name="telefone" id="telefone" />
              </div>
              <div class="veículo">
                <label for="veiculo">VEÍCULO</label>
                <input type="text" name="veiculo" id="veiculo" />
              </div>
              <div class="anoModelo">
                <label for="ano">ANO/MODELO</label>
                <input type="text" name="anoModelo" id="ano" />
              </div>
              <div class="PLACA">
                <label for="PLACA">PLACA</label>
                <input type="text" name="PLACA" id="PLACA" />
              </div>
              <div class="status">
                <label for="Status">STATUS</label>
                <input type="text" name="Status" id="Status" />
              </div>
              <div class="serviçosPeças">
                <label for="serviçosPeças">SERVIÇOS/PEÇAS</label>
                <input type="text" name="serviçosPeças" id="serviçosPeças" />
              </div>
              <div class="atendente">
                <label for="atendente">ATENDENTE</label>
                <input type="text" name="atendente" id="atendente" />
              </div>
              <div class="MECÂNICO">
                <label for="MECÂNICO">MECÂNICO</label>
                <input type="text" name="MECÂNICO" id="MECANICO" />
              </div>
              <div class="data">
                <label for="data">DATA</label>
                <input type="date" name="data" id="data" />
              </div>
              <div class="Orçamento">
                <label for="Orçamento">ORÇAMENTO</label>
                <input type="text" name="Orçamento" id="Orçamento" />
              </div>
            </form>
          </div>
          <div id="btnsCRUD">
            <input type="button" id="cadastrar" value="CADASTRAR" />
            <input type="button" id="editar" value="EDITAR" />
            <input type="button" id="excluir" value="EXCLUIR" />
          </div>
        </section>
